services:
  postgres:
    image: pgvector/pgvector:pg16  # PostgreSQL 16 + PGVector
    container_name: rag-pgvector
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
