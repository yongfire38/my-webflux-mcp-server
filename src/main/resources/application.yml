spring:
  application:
    name: mcp-server

  http:
    codecs:
      max-in-memory-size: 52428800  # 50MB — 멀티파트 업로드 허용 크기

  # Bean 오버라이딩 허용
  main:
    allow-bean-definition-overriding: true
    # 배너가 서버 연동시 오류를 일으킬 수 있으므로 반드시 off
    banner-mode: off

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/ragdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: update

  # Spring AI
  ai:
    # MCP Server (WebFlux - Reactive)
    mcp:
      server:
        type: ASYNC
        protocol: STREAMABLE
        # Sampling 등 서버→클라이언트 요청의 응답 대기 최대 시간 (기본 ~20s)
        # 클라이언트 LLM 성능에 따라 조절 필요
        request-timeout: 60s
        # MCP initialize 응답에 포함되는 서버 사용 안내.
        # VS Code·Claude Desktop·MCP Inspector 등 외부 클라이언트가 연결 즉시 수신.
        instructions: |
          이 서버는 RAG 지식 베이스 검색과 문서 업로드를 제공합니다.
          - searchDocuments: 벡터 유사도 검색 (질문 전 반드시 호출)
          - describeKnowledgeBase: 인덱싱 현황 확인
          - uploadAndIndexDocument: PDF/MD 업로드 (X-MCP-API-Key 헤더 필수)
        streamable-http:
          # 방화벽·프록시의 idle connection 강제 종료 방지용 주기적 ping
          keep-alive-interval: 30s

    # ONNX Embedding Model
    model:
      embedding: transformers

    embedding:
      transformer:
        onnx:
          modelUri: file:${EMBEDDING_MODEL_PATH:${user.home}/spring-ai-Config/model/model.onnx}
          modelOutputName: token_embeddings
        tokenizer:
          uri: file:${EMBEDDING_TOKENIZER_PATH:${user.home}/spring-ai-Config/model/tokenizer.json}
          options:
            padding: true
            truncation: true
            maxLength: 512
            returnTensor: true

    # PGVector
    vectorstore:
      pgvector:
        initialize-schema: true
        remove-existing-vector-store-table: false
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768

# Server Port
server:
  port: 9090

# Logging
logging:
  level:
    root: INFO
    com.example.webflux: DEBUG
    org.springframework.ai: INFO

# Document (custom namespace)
app:
  document:
    path: file:C:/workspace-test/upload/data/**/*.md
    pdf-path: file:C:/workspace-test/upload/data/**/*.pdf
    upload-dir: C:/workspace-test/upload/data
    pdf:
      page-top-margin: 0
      pages-per-document: 1
    chunk-size: 4000
    min-chunk-size-chars: 350
    max-num-chunks: 500
    min-chunk-length-to-embed: 50
    normalization:
      enabled: true
      remove-html-tags: true
      normalize-whitespace: true
      normalize-newlines: true
      remove-code-blocks: false
      clean-special-chars: true
  security:
    # 신뢰 클라이언트 API 키 목록.
    # MCP Tool uploadAndIndexDocument 및 POST /api/documents/upload 호출에 필요.
    # 환경변수 MCP_API_KEY 미설정 시 빈 문자열 → 모든 업로드 차단 (의도된 안전 기본값).
    api-keys:
      - "${MCP_API_KEY:}"

  rag:
    similarity-threshold: 0.30
    top-k: 5
    max-content-length: 2000
    hybrid:
      # 활성화 여부. false(기본)이면 dense 단일 검색만 사용 (기존 동작 유지)
      enabled: true
      # 채널별 RRF 가중치
      weight:
        dense: 1.0
        lexical: 1.0
      lexical:
        # pg_trgm.word_similarity_threshold (기본값 0.6은 너무 엄격 — 4000자 청크 기준 0.30 권장)
        # 0.30 → recall@3: 0.80 / 0.40 → 0.57 / 0.60(기본) → 0.31
        word-similarity-threshold: 0.30

# Springdoc (Swagger)
springdoc:
  paths-to-exclude: /mcp/**
