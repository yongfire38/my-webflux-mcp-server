spring:
  application:
    name: mcp-server

  http:
    codecs:
      max-in-memory-size: 52428800  # 50MB — 멀티파트 업로드 허용 크기

  # Bean 오버라이딩 허용
  main:
    allow-bean-definition-overriding: true
    # 배너가 서버 연동시 오류를 일으킬 수 있으므로 반드시 off
    banner-mode: off

  # PostgreSQL (전용 컨테이너 mcpdb:5434 — ragdb:5432 공유 컨테이너와 분리)
  datasource:
    url: jdbc:postgresql://localhost:5434/mcpdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate

  # Spring AI
  ai:
    # MCP Server (WebFlux - Reactive)
    mcp:
      server:
        type: ASYNC
        protocol: STREAMABLE

    # ONNX Embedding Model
    model:
      embedding: transformers

    embedding:
      transformer:
        onnx:
          modelUri: file:${EMBEDDING_MODEL_PATH:${user.home}/spring-ai-Config/model/model.onnx}
          modelOutputName: token_embeddings
        tokenizer:
          uri: file:${EMBEDDING_TOKENIZER_PATH:${user.home}/spring-ai-Config/model/tokenizer.json}
          options:
            padding: true
            truncation: true
            maxLength: 512
            returnTensor: true

    # Ollama (LLM — 서버에서 직접 호출)
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:HyperCLOVA-3b:Q4_K_MM}
          temperature: 0.7

    # JDBC 채팅 메모리 (spring_ai_chat_memory 테이블 자동 생성)
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

    # PGVector
    vectorstore:
      pgvector:
        initialize-schema: true
        remove-existing-vector-store-table: false
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768

# Server Port
server:
  port: 9090

# Logging
logging:
  level:
    root: INFO
    com.example.webflux: DEBUG
    org.springframework.ai: INFO

# Application
app:
  auth:
    jwt:
      secret: ${JWT_SECRET:dev-secret-key-for-local-use-only-change-in-prod}
      expiration-ms: 86400000   # 24시간
  document:
    path: file:C:/workspace-test/upload/data/**/*.md
    pdf-path: file:C:/workspace-test/upload/data/**/*.pdf
    upload-dir: C:/workspace-test/upload/data
    pdf:
      page-top-margin: 0
      pages-per-document: 1
    chunk-size: 4000
    min-chunk-size-chars: 350
    max-num-chunks: 500
    min-chunk-length-to-embed: 50
    normalization:
      enabled: true
      remove-html-tags: true
      normalize-whitespace: true
      normalize-newlines: true
      remove-code-blocks: false
      clean-special-chars: true
  rag:
    similarity-threshold: 0.30
    top-k: 5
    max-content-length: 2000
    hybrid:
      # 활성화 여부. false(기본)이면 dense 단일 검색만 사용 (기존 동작 유지)
      enabled: false
      # 채널별 RRF 가중치
      weight:
        dense: 1.0
        lexical: 1.0
      lexical:
        # pg_trgm.word_similarity_threshold (기본값 0.6은 너무 엄격 — 4000자 청크 기준 0.30 권장)
        # 0.30 → recall@3: 0.80 / 0.40 → 0.57 / 0.60(기본) → 0.31
        word-similarity-threshold: 0.30

# Springdoc (Swagger)
springdoc:
  paths-to-exclude: /mcp/**
